        - name: dev-tls
          secret:
            secretName: myapp-dev-tls
---
apiVersion: v1
kind: Service
metadata:
  name: myapp-dev-ilb
  namespace: edge
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    app: myapp-edge-router-dev
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
