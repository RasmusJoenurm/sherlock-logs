    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-edge-router-dev
  namespace: edge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp-edge-router-dev
  template:
    metadata:
      labels:
        app: myapp-edge-router-dev
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: dev-tls
              mountPath: /etc/nginx/tls
              readOnly: true
      volumes:
        - name: nginx-conf
