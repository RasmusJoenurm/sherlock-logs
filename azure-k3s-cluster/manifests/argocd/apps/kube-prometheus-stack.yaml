apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: gitops-galaxy
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 77.12.0
    helm:
      values: |
        grafana:
          adminPassword: "gitopsgalaxygrafana"
          ingress:
            enabled: false
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki-stack:3100
              isDefault: false

        alertmanager:
          enabled: true
          alertmanagerSpec:
            replicas: 1
          config:
            global:
              resolve_timeout: 5m
            route:
              receiver: discord-warning
              group_by: ['alertname', 'namespace', 'pod', 'job']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 2h
              routes:
                - receiver: discord-critical
                  matchers:
                    - severity="critical"
                  continue: false
                - receiver: discord-warning
                  matchers:
                    - severity="warning"
                  continue: false
            inhibit_rules:
              - source_matchers:
                  - severity="critical"
                target_matchers:
                  - severity="warning"
                equal:
                  - alertname
                  - namespace
                  - pod
            receivers:
              - name: discord-warning
                discord_configs:
                  - webhook_url: "DISCORD_WEBHOOK_URL_HERE"
                    send_resolved: true
                    title: '[WARNING] {{ .CommonLabels.alertname }}'
                    message: |
                      {{ range .Alerts -}}
                      **Summary:** {{ .Annotations.summary }}
                      **Description:** {{ .Annotations.description }}
                      **Severity:** {{ .Labels.severity }}
                      **Namespace:** {{ .Labels.namespace }}
                      **Pod:** {{ .Labels.pod }}
                      {{ end }}
              - name: discord-critical
                discord_configs:
                  - webhook_url: "DISCORD_WEBHOOK_URL_HERE"
                    send_resolved: true
                    title: '[CRITICAL] {{ .CommonLabels.alertname }}'
                    message: |
                      {{ range .Alerts -}}
                      **Summary:** {{ .Annotations.summary }}
                      **Description:** {{ .Annotations.description }}
                      **Severity:** {{ .Labels.severity }}
                      **Namespace:** {{ .Labels.namespace }}
                      **Pod:** {{ .Labels.pod }}
                      {{ end }}

        additionalPrometheusRulesMap:
          custom-alerts:
            groups:
              - name: mandatory.threshold.rules
                rules:
                  - alert: NodeCPUHighUsage
                    expr: |
                      (1 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 80
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Node CPU usage above 80%"
                      description: "Node {{ $labels.instance }} CPU usage is {{ $value | humanize }}% for more than 5 minutes."
                  - alert: NodeDiskLow
                    expr: |
                      (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 20
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Node disk space below 20%"
                      description: "Node {{ $labels.instance }} filesystem {{ $labels.mountpoint }} has {{ $value | humanize }}% free."
                  - alert: NodeMemoryHighUsage
                    expr: |
                      (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Node memory usage above 90%"
                      description: "Node {{ $labels.instance }} memory usage is {{ $value | humanize }}% for more than 5 minutes."
                  - alert: ContainerRestartingFrequently
                    expr: |
                      increase(kube_pod_container_status_restarts_total[15m]) > 3
                    for: 1m
                    labels:
                      severity: warning
                    annotations:
                      summary: "Container restarting too frequently"
                      description: "Container {{ $labels.container }} in pod {{ $labels.pod }} restarted {{ $value }} times in 15 minutes."
                  - alert: ContainerMemoryLimitHigh
                    expr: |
                      (container_memory_working_set_bytes{container!="", pod!=""} / kube_pod_container_resource_limits{resource="memory", unit="byte"}) * 100 > 80
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "Container memory usage above 80% of limit"
                      description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using {{ $value | humanize }}% of its memory limit."
                  - alert: InstanceDown
                    expr: up == 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Instance unreachable"
                      description: "Instance {{ $labels.instance }} (job: {{ $labels.job }}) unreachable for more than 1 minute."
                  - alert: ElasticsearchClusterNotHealthy
                    expr: |
                      elasticsearch_cluster_health_status{color=~"yellow|red"} == 1
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Elasticsearch cluster is unhealthy"
                      description: "Elasticsearch cluster {{ $labels.cluster }} status is {{ $labels.color }}."
              - name: custom.advanced.rules
                rules:
                  - alert: BackendHighLatencyP95
                    expr: |
                      histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=~".*backend.*"}[5m]))) > 1
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "Backend p95 latency is high"
                      description: "95th percentile backend latency above 1 second for 5 minutes."
                  - alert: BackendErrorRateHigh
                    expr: |
                      sum(rate(http_requests_total{status_code=~"5.."}[5m])) / sum(rate(http_requests_total[5m])) * 100 > 5
                    for: 3m
                    labels:
                      severity: warning
                    annotations:
                      summary: "Backend HTTP error rate above 5%"
                      description: "Backend 5xx error rate above 5% for 3 minutes."
                  - alert: PodMemoryPressureAndRestarts
                    expr: |
                      (sum by (namespace, pod, container) (container_memory_working_set_bytes{container!="", image!="", pod!=""}) / sum by (namespace, pod, container) (kube_pod_container_resource_limits{resource="memory", unit="byte"})) > 0.85
                      and on(namespace, pod, container)
                      increase(kube_pod_container_status_restarts_total[10m]) > 2
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Pod has memory pressure and restart trend"
                      description: "Container {{ $labels.container }} memory above 85% AND restarted >2 times in 10 minutes."
                  - alert: SustainedPodCPUHigh
                    expr: |
                      sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{container!="", image!="", pod!=""}[5m])) > 0.8
                    for: 10m
                    labels:
                      severity: warning
                    annotations:
                      summary: "Sustained high CPU on pod"
                      description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} CPU above 0.8 cores for 10 minutes."
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
