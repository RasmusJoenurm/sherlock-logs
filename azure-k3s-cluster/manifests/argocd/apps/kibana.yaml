apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kibana
  namespace: argocd
spec:
  project: gitops-galaxy
  source:
    repoURL: https://helm.elastic.co
    chart: kibana
    targetRevision: 8.5.1
    helm:
      values: |
        service:
          type: ClusterIP
        ingress:
          enabled: false
        elasticsearchHosts: "https://elasticsearch-master:9200"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
        extraEnvs:
          - name: ELASTICSEARCH_SSL_VERIFICATIONMODE
            value: none
  destination:
    server: https://kubernetes.default.svc
    namespace: elastic
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true

