apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-gitops-galaxy
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: repo-gitops-galaxy
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: https://github.com/RasmusJoenurm/sherlock-logs.git
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/gitops-galaxy/argocd/repo
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/gitops-galaxy/argocd/repo
        property: password

