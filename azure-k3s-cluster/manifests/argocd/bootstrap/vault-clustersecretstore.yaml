apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: https://unwillfully-nondetachable-marcelino.ngrok-free.dev
      path: secret
      version: v2
      namespace: admin
      auth:
        tokenSecretRef:
          name: vault-token
          key: vault-token
          namespace: external-secrets

