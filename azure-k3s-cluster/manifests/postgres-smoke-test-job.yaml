apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-smoke-test
  namespace: db-dev
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: psql
          image: docker.io/bitnami/postgresql:16.4.0-debian-12-r12
          command:
            - /bin/sh
            - -c
            - |
              export PGPASSWORD="${DB_PASSWORD}"
              psql \
                -h postgres-dev-postgresql \
                -p 5432 \
                -U "${DB_USER}" \
                -d "${DB_NAME}" \
                -c "SELECT current_database(), current_user, version();"
          env:
            - name: DB_NAME
              value: gitops
            - name: DB_USER
              value: gitops
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-db-credentials
                  key: password

