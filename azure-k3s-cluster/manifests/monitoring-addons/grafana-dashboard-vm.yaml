apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-vm-performance
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  vm-performance.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "title": "Node CPU Usage (%)",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "(1 - avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "percent", "min": 0, "max": 100},
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Value"},
                "properties": [
                  {"id": "thresholds", "value": {"mode": "absolute", "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 70},
                    {"color": "red", "value": 80}
                  ]}}
                ]
              }
            ]
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "title": "Node Memory Usage (%)",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "percent", "min": 0, "max": 100},
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Value"},
                "properties": [
                  {"id": "thresholds", "value": {"mode": "absolute", "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 80},
                    {"color": "red", "value": 90}
                  ]}}
                ]
              }
            ]
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        },
        {
          "title": "Disk I/O — Read bytes/sec",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(node_disk_read_bytes_total[5m])",
              "legendFormat": "{{instance}} {{device}} read"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "Bps"}
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
        },
        {
          "title": "Disk I/O — Write bytes/sec",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(node_disk_written_bytes_total[5m])",
              "legendFormat": "{{instance}} {{device}} write"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "Bps"}
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
        },
        {
          "title": "Network Traffic — Receive bytes/sec",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{device!~\"lo|veth.*|docker.*|cali.*\"}[5m])",
              "legendFormat": "{{instance}} {{device}} rx"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "Bps"}
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16}
        },
        {
          "title": "Network Traffic — Transmit bytes/sec",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|docker.*|cali.*\"}[5m])",
              "legendFormat": "{{instance}} {{device}} tx"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "Bps"}
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16}
        },
        {
          "title": "Disk Space Available (%)",
          "type": "gauge",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "(node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay\"}) * 100",
              "legendFormat": "{{instance}} {{mountpoint}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 20},
                  {"color": "green", "value": 40}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24}
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["vm", "node", "infrastructure", "sherlock"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "title": "VM Performance",
      "version": 1
    }
