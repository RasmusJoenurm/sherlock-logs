apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-app-performance
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  app-performance.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "title": "HTTP Request Rate (by endpoint)",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by (path, method) (rate(http_requests_total{job=~\".*backend.*\"}[5m]))",
              "legendFormat": "{{method}} {{path}}"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "reqps"}
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "title": "HTTP Error Rate (%)",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=~\".*backend.*\", status_code=~\"5..\"}[5m])) / sum(rate(http_requests_total{job=~\".*backend.*\"}[5m])) * 100",
              "legendFormat": "5xx error rate"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "percent", "max": 100}
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        },
        {
          "title": "Response Time p50 / p95 / p99",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket{job=~\".*backend.*\"}[5m])))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=~\".*backend.*\"}[5m])))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{job=~\".*backend.*\"}[5m])))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "s"}
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
        },
        {
          "title": "User Registrations (custom metric)",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(active_user_registrations_total[5m])",
              "legendFormat": "registrations/sec"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "ops"}
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["application", "backend", "sherlock"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "title": "Application Performance",
      "version": 1
    }
