apiVersion: v1
kind: ConfigMap
metadata:
  name: kibana-dashboards
  namespace: elastic
data:
  # ── System Logs Dashboard ───────────────────────────────────────────────────
  # Visualizes syslog and dmesg logs tagged with log_type: system by Filebeat.
  system-logs-dashboard.ndjson: |
    {"type":"index-pattern","id":"logstash-system","attributes":{"title":"logstash-*","timeFieldName":"@timestamp"}}
    {"type":"search","id":"system-logs-search","attributes":{"title":"System Logs","description":"Syslog and dmesg from all nodes","hits":0,"columns":["@timestamp","host.name","message"],"sort":[["@timestamp","desc"]],"kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"logstash-system\",\"query\":{\"query_string\":{\"query\":\"log_type: system\",\"analyze_wildcard\":true}},\"filter\":[]}"}}}
    {"type":"visualization","id":"system-log-count","attributes":{"title":"System Log Volume Over Time","visState":"{\"title\":\"System Log Volume Over Time\",\"type\":\"histogram\",\"params\":{\"addLegend\":true,\"addTimeMarker\":false,\"addTooltip\":true,\"categoryAxes\":[{\"id\":\"CategoryAxis-1\",\"labels\":{\"show\":true,\"truncate\":100},\"position\":\"bottom\",\"scale\":{\"type\":\"linear\"},\"show\":true,\"style\":{},\"title\":{},\"type\":\"category\"}],\"grid\":{\"categoryLines\":false},\"legendPosition\":\"right\",\"seriesParams\":[{\"data\":{\"id\":\"1\",\"label\":\"Count\"},\"drawLinesBetweenPoints\":true,\"mode\":\"stacked\",\"show\":true,\"showCircles\":true,\"type\":\"histogram\",\"valueAxis\":\"ValueAxis-1\"}],\"times\":[],\"type\":\"histogram\",\"valueAxes\":[{\"id\":\"ValueAxis-1\",\"labels\":{\"filter\":false,\"rotate\":0,\"show\":true,\"truncate\":100},\"name\":\"LeftAxis-1\",\"position\":\"left\",\"scale\":{\"mode\":\"normal\",\"type\":\"linear\"},\"show\":true,\"style\":{},\"title\":{\"text\":\"Count\"},\"type\":\"value\"}]},\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"date_histogram\",\"schema\":\"segment\",\"params\":{\"field\":\"@timestamp\",\"useNormalizedEsInterval\":true,\"interval\":\"auto\",\"drop_partials\":false,\"min_doc_count\":1,\"extended_bounds\":{}}}]}","savedSearchId":"system-logs-search","kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"logstash-system\",\"filter\":[],\"query\":{\"query\":\"log_type: system\",\"language\":\"kuery\"}}"}}}
    {"type":"dashboard","id":"system-logs-dashboard","attributes":{"title":"System Logs Dashboard","description":"System logs (syslog, dmesg) from all cluster nodes","panelsJSON":"[{\"version\":\"8.5.0\",\"type\":\"search\",\"id\":\"system-logs-search\",\"panelIndex\":\"1\",\"gridData\":{\"x\":0,\"y\":8,\"w\":48,\"h\":15,\"i\":\"1\"}},{\"version\":\"8.5.0\",\"type\":\"visualization\",\"id\":\"system-log-count\",\"panelIndex\":\"2\",\"gridData\":{\"x\":0,\"y\":0,\"w\":48,\"h\":8,\"i\":\"2\"}}]","optionsJSON":"{\"useMargins\":true,\"syncColors\":false,\"hidePanelTitles\":false}","timeRestore":false,"kibanaSavedObjectMeta":{"searchSourceJSON":"{\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[]}"}}}

  # ── Application Logs Dashboard ──────────────────────────────────────────────
  # Visualizes logs from the backend and frontend containers.
  application-logs-dashboard.ndjson: |
    {"type":"index-pattern","id":"logstash-app","attributes":{"title":"logstash-*","timeFieldName":"@timestamp"}}
    {"type":"search","id":"app-logs-search","attributes":{"title":"Application Logs","description":"Backend and frontend container logs","hits":0,"columns":["@timestamp","kubernetes.namespace","kubernetes.pod.name","kubernetes.container.name","message"],"sort":[["@timestamp","desc"]],"kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"logstash-app\",\"query\":{\"query_string\":{\"query\":\"kubernetes.container.name: (backend OR frontend) OR log_type: application\",\"analyze_wildcard\":true}},\"filter\":[]}"}}}
    {"type":"visualization","id":"app-error-count","attributes":{"title":"Application Error Rate Over Time","visState":"{\"title\":\"Application Error Rate Over Time\",\"type\":\"histogram\",\"params\":{\"addLegend\":true,\"addTimeMarker\":false,\"addTooltip\":true,\"categoryAxes\":[{\"id\":\"CategoryAxis-1\",\"labels\":{\"show\":true,\"truncate\":100},\"position\":\"bottom\",\"scale\":{\"type\":\"linear\"},\"show\":true,\"style\":{},\"title\":{},\"type\":\"category\"}],\"grid\":{\"categoryLines\":false},\"legendPosition\":\"right\",\"seriesParams\":[{\"data\":{\"id\":\"1\",\"label\":\"Count\"},\"drawLinesBetweenPoints\":true,\"mode\":\"stacked\",\"show\":true,\"showCircles\":true,\"type\":\"histogram\",\"valueAxis\":\"ValueAxis-1\"}],\"times\":[],\"type\":\"histogram\",\"valueAxes\":[{\"id\":\"ValueAxis-1\",\"labels\":{\"filter\":false,\"rotate\":0,\"show\":true,\"truncate\":100},\"name\":\"LeftAxis-1\",\"position\":\"left\",\"scale\":{\"mode\":\"normal\",\"type\":\"linear\"},\"show\":true,\"style\":{},\"title\":{\"text\":\"Count\"},\"type\":\"value\"}]},\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"date_histogram\",\"schema\":\"segment\",\"params\":{\"field\":\"@timestamp\",\"useNormalizedEsInterval\":true,\"interval\":\"auto\",\"drop_partials\":false,\"min_doc_count\":1,\"extended_bounds\":{}}},{\"id\":\"3\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"group\",\"params\":{\"field\":\"kubernetes.container.name\",\"orderBy\":\"1\",\"order\":\"desc\",\"size\":5,\"otherBucket\":false}}]}","savedSearchId":"app-logs-search","kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"logstash-app\",\"filter\":[],\"query\":{\"query\":\"message: ERROR OR message: Exception OR message: CRITICAL\",\"language\":\"kuery\"}}"}}}
    {"type":"dashboard","id":"application-logs-dashboard","attributes":{"title":"Application Logs Dashboard","description":"Backend and frontend application logs including errors and access logs","panelsJSON":"[{\"version\":\"8.5.0\",\"type\":\"visualization\",\"id\":\"app-error-count\",\"panelIndex\":\"1\",\"gridData\":{\"x\":0,\"y\":0,\"w\":48,\"h\":8,\"i\":\"1\"}},{\"version\":\"8.5.0\",\"type\":\"search\",\"id\":\"app-logs-search\",\"panelIndex\":\"2\",\"gridData\":{\"x\":0,\"y\":8,\"w\":48,\"h\":20,\"i\":\"2\"}}]","optionsJSON":"{\"useMargins\":true,\"syncColors\":false,\"hidePanelTitles\":false}","timeRestore":false,"kibanaSavedObjectMeta":{"searchSourceJSON":"{\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[]}"}}}

  # ── Docker Logs Dashboard ───────────────────────────────────────────────────
  # Visualizes all container stdout/stderr logs, grouped by namespace and pod.
  docker-logs-dashboard.ndjson: |
    {"type":"index-pattern","id":"logstash-docker","attributes":{"title":"logstash-*","timeFieldName":"@timestamp"}}
    {"type":"search","id":"docker-logs-search","attributes":{"title":"Docker Container Logs","description":"All container stdout/stderr logs","hits":0,"columns":["@timestamp","kubernetes.namespace","kubernetes.pod.name","kubernetes.container.name","message"],"sort":[["@timestamp","desc"]],"kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"logstash-docker\",\"query\":{\"query_string\":{\"query\":\"log_type: docker OR kubernetes.namespace: *\",\"analyze_wildcard\":true}},\"filter\":[]}"}}}
    {"type":"visualization","id":"docker-logs-by-namespace","attributes":{"title":"Container Log Volume by Namespace","visState":"{\"title\":\"Container Log Volume by Namespace\",\"type\":\"pie\",\"params\":{\"addLegend\":true,\"addTooltip\":true,\"isDonut\":true,\"legendPosition\":\"right\",\"type\":\"pie\"},\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"segment\",\"params\":{\"field\":\"kubernetes.namespace\",\"orderBy\":\"1\",\"order\":\"desc\",\"size\":10,\"otherBucket\":true}}]}","kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"logstash-docker\",\"filter\":[],\"query\":{\"query\":\"\",\"language\":\"kuery\"}}"}}}
    {"type":"visualization","id":"docker-logs-volume","attributes":{"title":"Docker Log Volume Over Time","visState":"{\"title\":\"Docker Log Volume Over Time\",\"type\":\"histogram\",\"params\":{\"addLegend\":true,\"addTimeMarker\":false,\"addTooltip\":true,\"categoryAxes\":[{\"id\":\"CategoryAxis-1\",\"labels\":{\"show\":true,\"truncate\":100},\"position\":\"bottom\",\"scale\":{\"type\":\"linear\"},\"show\":true,\"style\":{},\"title\":{},\"type\":\"category\"}],\"grid\":{\"categoryLines\":false},\"legendPosition\":\"right\",\"seriesParams\":[{\"data\":{\"id\":\"1\",\"label\":\"Count\"},\"drawLinesBetweenPoints\":true,\"mode\":\"stacked\",\"show\":true,\"showCircles\":true,\"type\":\"histogram\",\"valueAxis\":\"ValueAxis-1\"}],\"times\":[],\"type\":\"histogram\",\"valueAxes\":[{\"id\":\"ValueAxis-1\",\"labels\":{\"filter\":false,\"rotate\":0,\"show\":true,\"truncate\":100},\"name\":\"LeftAxis-1\",\"position\":\"left\",\"scale\":{\"mode\":\"normal\",\"type\":\"linear\"},\"show\":true,\"style\":{},\"title\":{\"text\":\"Count\"},\"type\":\"value\"}]},\"aggs\":[{\"id\":\"1\",\"enabled\":true,\"type\":\"count\",\"schema\":\"metric\",\"params\":{}},{\"id\":\"2\",\"enabled\":true,\"type\":\"date_histogram\",\"schema\":\"segment\",\"params\":{\"field\":\"@timestamp\",\"useNormalizedEsInterval\":true,\"interval\":\"auto\",\"drop_partials\":false,\"min_doc_count\":1,\"extended_bounds\":{}}},{\"id\":\"3\",\"enabled\":true,\"type\":\"terms\",\"schema\":\"group\",\"params\":{\"field\":\"kubernetes.namespace\",\"orderBy\":\"1\",\"order\":\"desc\",\"size\":5,\"otherBucket\":true}}]}","kibanaSavedObjectMeta":{"searchSourceJSON":"{\"index\":\"logstash-docker\",\"filter\":[],\"query\":{\"query\":\"\",\"language\":\"kuery\"}}"}}}
    {"type":"dashboard","id":"docker-logs-dashboard","attributes":{"title":"Docker Logs Dashboard","description":"Container stdout/stderr logs from all Kubernetes pods, grouped by namespace and pod","panelsJSON":"[{\"version\":\"8.5.0\",\"type\":\"visualization\",\"id\":\"docker-logs-volume\",\"panelIndex\":\"1\",\"gridData\":{\"x\":0,\"y\":0,\"w\":32,\"h\":8,\"i\":\"1\"}},{\"version\":\"8.5.0\",\"type\":\"visualization\",\"id\":\"docker-logs-by-namespace\",\"panelIndex\":\"2\",\"gridData\":{\"x\":32,\"y\":0,\"w\":16,\"h\":8,\"i\":\"2\"}},{\"version\":\"8.5.0\",\"type\":\"search\",\"id\":\"docker-logs-search\",\"panelIndex\":\"3\",\"gridData\":{\"x\":0,\"y\":8,\"w\":48,\"h\":20,\"i\":\"3\"}}]","optionsJSON":"{\"useMargins\":true,\"syncColors\":false,\"hidePanelTitles\":false}","timeRestore":false,"kibanaSavedObjectMeta":{"searchSourceJSON":"{\"query\":{\"query\":\"\",\"language\":\"kuery\"},\"filter\":[]}"}}}
