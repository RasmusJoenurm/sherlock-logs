apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-docker-containers
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  docker-containers.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "title": "Container CPU Usage by Pod",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by (pod, namespace) (rate(container_cpu_usage_seconds_total{container!=\"\", pod!=\"\"}[5m]))",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "cores"}
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "title": "Container Memory (Working Set) by Pod",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by (pod, namespace) (container_memory_working_set_bytes{container!=\"\", pod!=\"\"})",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "bytes"}
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        },
        {
          "title": "Container Restart Count (last 30m)",
          "type": "bargauge",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total[30m]) > 0",
              "legendFormat": "{{namespace}}/{{pod}}/{{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 3}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8}
        },
        {
          "title": "Container Memory % of Limit",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "(container_memory_working_set_bytes{container!=\"\", pod!=\"\"} / kube_pod_container_resource_limits{resource=\"memory\", unit=\"byte\"}) * 100",
              "legendFormat": "{{namespace}}/{{pod}}/{{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 80}
                ]
              }
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16}
        },
        {
          "title": "Container Health — Running vs Not Running",
          "type": "stat",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "count(kube_pod_container_status_running == 1)",
              "legendFormat": "Running containers"
            },
            {
              "expr": "count(kube_pod_container_status_waiting == 1)",
              "legendFormat": "Waiting containers"
            },
            {
              "expr": "count(kube_pod_container_status_terminated == 1)",
              "legendFormat": "Terminated containers"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "short"}
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16}
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["docker", "containers", "kubernetes", "sherlock"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "title": "Docker Container Performance",
      "version": 1
    }
