nameOverride: ""
fullnameOverride: ""

namespace:
  create: true
  name: app-dev

imagePullSecrets: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false

frontend:
  replicaCount: 2
  image:
    repository: docker.io/rasmusjoenurm/frontend
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  backendBaseUrl: http://myapp-backend:8080
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  livenessProbe:
    httpGet:
      path: /
      port: http
  readinessProbe:
    httpGet:
      path: /
      port: http
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

backend:
  replicaCount: 2
  image:
    repository: docker.io/rasmusjoenurm/backend
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 192Mi
    limits:
      cpu: 400m
      memory: 384Mi
  livenessProbe:
    httpGet:
      path: /health
      port: http
  readinessProbe:
    httpGet:
      path: /health
      port: http
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  appConfig:
    logLevel: info

database:
  secretName: app-db-credentials
  keys:
    host: host
    port: port
    database: database
    username: username
    password: password

appSecrets:
  keys:
    jwt: jwt_key
  jwt_key: ""

externalSecrets:
  enabled: false

resourceQuota:
  enabled: true
  hard:
    pods: "20"
    requests.cpu: "4"
    requests.memory: 6Gi
    limits.cpu: "8"
    limits.memory: 12Gi

pdb:
  frontend:
    enabled: true
    minAvailable: 1
  backend:
    enabled: true
    minAvailable: 1

ingress:
  enabled: false

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - gitops-galaxy.local

nodeSelector: {}
tolerations: []

affinity: {}
