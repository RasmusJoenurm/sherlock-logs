namespace:
  name: app-dev

externalSecrets:
  enabled: true
  remoteKeys:
    host: secret/data/gitops-galaxy/dev/database
    port: secret/data/gitops-galaxy/dev/database
    database: secret/data/gitops-galaxy/dev/database
    username: secret/data/gitops-galaxy/dev/database
    password: secret/data/gitops-galaxy/dev/database
    jwt: secret/data/gitops-galaxy/dev/database

database:
  secretName: app-db-credentials
  keys:
    host: host
    port: port
    database: database
    username: username
    password: password

frontend:
  image:
    repository: docker.io/rasmusjoenurm/frontend
    tag: "1.0.44"
  replicaCount: 2
  backendBaseUrl: http://myapp-backend:8080

backend:
  image:
    repository: docker.io/rasmusjoenurm/backend
    tag: "1.0.44"
  replicaCount: 2

ingress:
  enabled: false
